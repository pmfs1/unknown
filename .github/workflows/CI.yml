name: 'CI'
on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [ "trunk" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "trunk" ]
  workflow_dispatch:
jobs:
  BUILD:
    name: 'BUILD'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 'CHECKOUT'
        uses: actions/checkout@v4
      - name: 'SETUP'
        run: sudo apt-get update -y && sudo apt install software-properties-common make gcc g++ opencl-headers ocl-icd-opencl-dev libopencv-videoio-dev libopencv-core-dev nvidia-cuda-toolkit -y
      - name: 'INSTALL STD_LIB'
        run: make install
      - name: 'INSTALL CUDA_LIB'
        run: make cuda-install CUDA_ARCH=sm_61
      - name: 'UNINSTALL'
        run: make uninstall
  TEST:
    name: 'TEST'
    needs: BUILD
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 'CHECKOUT'
        uses: actions/checkout@v4
      - name: 'SETUP'
        run: sudo apt-get update -y && sudo apt install software-properties-common make gcc g++ opencl-headers ocl-icd-opencl-dev libopencv-videoio-dev libopencv-core-dev nvidia-cuda-toolkit -y
      - name: 'INSTALL STD_LIB'
        run: make install
      - name: 'INSTALL CUDA_LIB'
        run: make cuda-install CUDA_ARCH=sm_61
      - name: 'BENCHMARK CUDA'
        run: cd benchmark/cuda && make && ./bin/bench
      - name: 'BENCHMARK STD'
        run: cd benchmark/std && make && ./bin/bench
      - name: 'UNINSTALL'
        run: make uninstall
